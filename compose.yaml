services:
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    image: savh-erp-db-backup:local
    container_name: savh_erp_db_backup
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SAVH_BACKUP_CONFIG: /app/config/config.toml
      TZ: America/Santiago
    volumes:
      - ./config:/app/config:ro
      - ./data:/data
      - ./secrets:/run/secrets:ro
